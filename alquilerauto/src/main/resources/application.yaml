server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: alquilerauto

  datasource:
    url: jdbc:sqlserver://localhost\\SQLEXPRESS:1433;databaseName=BD_RentCar;encrypt=true;trustServerCertificate=true
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:sql}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:drivo-alquilerauto-jwt-secret-key-2026-must-be-256-bits-minimum}
    expiration-ms: 86400000
